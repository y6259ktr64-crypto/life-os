<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Chess AI</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Chess Engine Logic (chess.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="sub-header">MINIMAL CHESS</div>
        <h1 class="title" id="status">ТВОЙ ХОД</h1>
    </header>

    <!-- Шахматная доска -->
    <div class="board-container">
        <div id="chessboard" class="chessboard"></div>
    </div>

    <!-- Информационная панель -->
    <div class="card info-card">
        <div class="info-item">
            <span class="label">ИГРОК</span>
            <span class="val">БЕЛЫЕ ⚪️</span>
        </div>
        <div class="divider"></div>
        <div class="info-item">
            <span class="label">СОПЕРНИК</span>
            <span class="val">ИИ 🤖</span>
        </div>
    </div>

    <!-- Управление -->
    <button class="btn-restart" onclick="resetGame()">НОВАЯ ИГРА</button>

    <script src="js/app.js"></script>
</body>
</html>
