<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Chess AI</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Chess Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

    <header>
        <div class="sub-header">STOCKFISH AI (3000 ELO)</div>
        <h1 class="title" id="status">ВЫБЕРИТЕ ЦВЕТ</h1>
    </header>

    <!-- Выбор цвета -->
    <div class="card">
        <div class="card-title">ВЫБОР ЦВЕТА</div>
        <div class="color-selector">
            <button class="color-btn active" id="btn-w" onclick="selectColor('w')">⚪️ Белые</button>
            <button class="color-btn" id="btn-random" onclick="selectColor('random')">🎲 Рандом</button>
            <button class="color-btn" id="btn-b" onclick="selectColor('b')">🖤 Черные</button>
        </div>
    </div>

    <!-- Шахматная доска -->
    <div class="board-container">
        <div id="chessboard" class="chessboard"></div>
    </div>

    <!-- Кнопка Новая Игра -->
    <button class="btn-restart" onclick="resetGame()">НОВАЯ ИГРА</button>

    <script src="js/app.js?v=2"></script>
</body>
</html>
