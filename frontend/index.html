<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Chess AI</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Chess Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

    <!-- ЭКРАН МЕНЮ И НАСТРОЕК -->
    <div id="menu-screen" class="screen active">
        <header>
            <div class="sub-header">CHESS MINI APP</div>
            <h1 class="title">НАСТРОЙКА ИГРЫ</h1>
        </header>

        <!-- Выбор цвета -->
        <div class="card">
            <div class="card-title">ВЫБОР ЦВЕТА</div>
            <div class="color-selector">
                <button class="color-btn active" id="color-btn-w" onclick="selectColorChoice('w')">⚪️ Белые</button>
                <button class="color-btn" id="color-btn-random" onclick="selectColorChoice('random')">🎲 Рандом</button>
                <button class="color-btn" id="color-btn-b" onclick="selectColorChoice('b')">🖤 Черные</button>
            </div>
        </div>

        <!-- Выбор уровня сложности (1 - 10) -->
        <div class="card">
            <div class="card-title">СЛОЖНОСТЬ ИИ</div>
            <div id="level-title" class="level-badge">Уровень 5 — Опытный</div>
            <div class="level-grid">
                <button class="level-btn" id="lvl-btn-1" onclick="selectLevel(1)">1</button>
                <button class="level-btn" id="lvl-btn-2" onclick="selectLevel(2)">2</button>
                <button class="level-btn" id="lvl-btn-3" onclick="selectLevel(3)">3</button>
                <button class="level-btn" id="lvl-btn-4" onclick="selectLevel(4)">4</button>
                <button class="level-btn active" id="lvl-btn-5" onclick="selectLevel(5)">5</button>
                <button class="level-btn" id="lvl-btn-6" onclick="selectLevel(6)">6</button>
                <button class="level-btn" id="lvl-btn-7" onclick="selectLevel(7)">7</button>
                <button class="level-btn" id="lvl-btn-8" onclick="selectLevel(8)">8</button>
                <button class="level-btn" id="lvl-btn-9" onclick="selectLevel(9)">9</button>
                <button class="level-btn" id="lvl-btn-10" onclick="selectLevel(10)">10</button>
            </div>
        </div>

        <!-- Кнопка Старт -->
        <button class="btn-primary" onclick="startGame()">ИГРАТЬ ♟</button>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-screen" class="screen">
        <header class="game-header">
            <button class="btn-back" onclick="showMenu()">⚙️ Настройки</button>
            <div id="game-info-badge" class="info-pill">Уровень 5 | ⚪️ Белые</div>
        </header>

        <h2 class="title" id="status">ТВОЙ ХОД</h2>

        <!-- Шахматная доска -->
        <div class="board-container">
            <div id="chessboard" class="chessboard"></div>
        </div>

        <!-- Кнопка Перезапуск -->
        <button class="btn-primary" onclick="restartGame()">НОВАЯ ИГРА</button>
    </div>

    <script src="js/app.js?v=3"></script>
</body>
</html>
