<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Chess Mini App</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Chess Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        :root {
            --bg-main: #f4f4f6;
            --card-bg: #ffffff;
            --text-primary: #111113;
            --text-muted: #8e8e93;
            --border-color: #e0e0e5;
            --sq-light: #ffffff;
            --sq-dark: #e1e1e6;
            --sq-selected: #111113;
            --radius-main: 18px;
            --radius-small: 10px;
            --font-main: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 360px;
            flex-direction: column;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        header {
            width: 100%;
            margin-bottom: 12px;
        }

        .sub-header {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .title {
            font-size: 22px;
            font-weight: 800;
            margin: 4px 0 0 0;
            letter-spacing: -0.03em;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-main);
            padding: 14px;
            border: 1px solid var(--border-color);
            width: 100%;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-option {
            flex: 1;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-small);
            padding: 10px 0;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .btn-option.active {
            background: var(--text-primary);
            color: #ffffff;
            border-color: var(--text-primary);
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .level-badge {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-align: center;
            background: var(--bg-main);
            padding: 6px 10px;
            border-radius: var(--radius-small);
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        /* Экран игры */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn-back {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-small);
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
        }

        .info-pill {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .player-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-small);
            padding: 8px 12px;
        }

        .player-name {
            font-size: 13px;
            font-weight: 700;
        }

        .timer-box {
            font-size: 14px;
            font-weight: 800;
            font-family: monospace;
            background: var(--bg-main);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .player-bar.active-turn {
            border-color: var(--text-primary);
        }

        .player-bar.active-turn .timer-box {
            background: var(--text-primary);
            color: #ffffff;
        }

        .board-container {
            width: 100%;
            aspect-ratio: 1;
            background: var(--card-bg);
            border-radius: var(--radius-main);
            padding: 8px;
            border: 1px solid var(--border-color);
            margin: 8px 0;
        }

        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            height: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .square svg {
            width: 82%;
            height: 82%;
            display: block;
            pointer-events: none;
        }

        .square.light { background-color: var(--sq-light); }
        .square.dark { background-color: var(--sq-dark); }

        .square.selected {
            background-color: var(--sq-selected) !important;
        }

        .square.selected svg {
            filter: invert(1);
        }

        .square.possible::after {
            content: '';
            width: 12px;
            height: 12px;
            background-color: rgba(17, 17, 19, 0.25);
            border-radius: 50%;
        }

        .btn-primary {
            width: 100%;
            background: var(--text-primary);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 14px 0;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 4px;
        }

        .disabled-card {
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 1. ЭКРАН МЕНЮ И НАСТРОЕК -->
    <div id="menu-screen" class="screen active">
        <header>
            <div class="sub-header">CHESS MINI APP</div>
            <h1 class="title">НАСТРОЙКА ИГРЫ</h1>
        </header>

        <!-- Выбор режима -->
        <div class="card">
            <div class="card-title">РЕЖИМ ИГРЫ</div>
            <div class="btn-group">
                <button class="btn-option active" id="mode-ai" onclick="selectMode('ai')">🤖 Против ИИ</button>
                <button class="btn-option" id="mode-pvp" onclick="selectMode('pvp')">👥 2 Игрока</button>
            </div>
        </div>

        <!-- Контроль времени -->
        <div class="card">
            <div class="card-title">ТАЙМЕР (НА ИГРОКА)</div>
            <div class="time-grid">
                <button class="btn-option active" id="time-0" onclick="selectTime(0)">♾️ Без</button>
                <button class="btn-option" id="time-60" onclick="selectTime(60)">1 мин</button>
                <button class="btn-option" id="time-1200" onclick="selectTime(1200)">20 мин</button>
                <button class="btn-option" id="time-3600" onclick="selectTime(3600)">1 час</button>
            </div>
        </div>

        <!-- Выбор цвета (Только для ИИ) -->
        <div class="card" id="card-color">
            <div class="card-title">ТВОЙ ЦВЕТ</div>
            <div class="btn-group">
                <button class="btn-option active" id="color-btn-w" onclick="selectColorChoice('w')">⚪️ Белые</button>
                <button class="btn-option" id="color-btn-random" onclick="selectColorChoice('random')">🎲 Рандом</button>
                <button class="btn-option" id="color-btn-b" onclick="selectColorChoice('b')">🖤 Черные</button>
            </div>
        </div>

        <!-- Выбор уровня сложности (Только для ИИ) -->
        <div class="card" id="card-level">
            <div class="card-title">СЛОЖНОСТЬ ИИ</div>
            <div id="level-title" class="level-badge">Уровень 5 — Опытный</div>
            <div class="level-grid">
                <button class="btn-option" onclick="selectLevel(1)">1</button>
                <button class="btn-option" onclick="selectLevel(2)">2</button>
                <button class="btn-option" onclick="selectLevel(3)">3</button>
                <button class="btn-option" onclick="selectLevel(4)">4</button>
                <button class="btn-option active" id="lvl-btn-5" onclick="selectLevel(5)">5</button>
                <button class="btn-option" onclick="selectLevel(6)">6</button>
                <button class="btn-option" onclick="selectLevel(7)">7</button>
                <button class="btn-option" onclick="selectLevel(8)">8</button>
                <button class="btn-option" onclick="selectLevel(9)">9</button>
                <button class="btn-option" onclick="selectLevel(10)">10</button>
            </div>
        </div>

        <button class="btn-primary" onclick="startGame()">ИГРАТЬ ♟</button>
    </div>

    <!-- 2. ЭКРАН ИГРЫ -->
    <div id="game-screen" class="screen">
        <header class="game-header">
            <button class="btn-back" onclick="showMenu()">⚙️ Настройки</button>
            <div id="game-info-badge" class="info-pill">Против ИИ</div>
        </header>

        <!-- Верхний игрок -->
        <div id="top-player-bar" class="player-bar">
            <span class="player-name" id="top-player-name">🖤 Соперник</span>
            <span class="timer-box" id="top-timer">--:--</span>
        </div>

        <!-- Доска -->
        <div class="board-container">
            <div id="chessboard" class="chessboard"></div>
        </div>

        <!-- Нижний игрок -->
        <div id="bottom-player-bar" class="player-bar">
            <span class="player-name" id="bottom-player-name">⚪️ Ты</span>
            <span class="timer-box" id="bottom-timer">--:--</span>
        </div>

        <h2 class="title" id="status" style="text-align: center; margin-top: 10px;">ТВОЙ ХОД</h2>

        <button class="btn-primary" onclick="restartGame()">НОВАЯ ИГРА</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        const game = new Chess();
        let selectedSquare = null;
        let gameMode = 'ai';
        let selectedColorChoice = 'w';
        let selectedDepth = 5;
        let selectedTimeLimit = 0; // в секундах

        let playerColor = 'w';
        let whiteTime = 0;
        let blackTime = 0;
        let timerInterval = null;

        const levelNames = {
            1: "1 — Новичок", 2: "2 — Любитель", 3: "3 — Игрок", 4: "4 — Клубный",
            5: "5 — Опытный", 6: "6 — Кандидат", 7: "7 — Мастер", 8: "8 — Гроссмейстер",
            9: "9 — Чемпион", 10: "10 — Непобедимый"
        };

        const piecePaths = {
            'p': `<path d="M 22,9 C 19.79,9 18,10.79 18,13 C 18,13.89 18.29,14.71 18.78,15.38 C 16.83,16.5 15.5,18.59 15.5,21 C 15.5,23.03 16.44,24.84 17.91,26.03 C 14.91,27.09 10.5,31.58 10.5,39.5 L 33.5,39.5 C 33.5,31.58 29.09,27.09 26.09,26.03 C 27.56,24.84 28.5,23.03 28.5,21 C 28.5,18.59 27.17,16.5 25.22,15.38 C 25.71,14.71 26,13.89 26,13 C 26,10.79 24.21,9 22,9 z"/>`,
            'r': `<g><path d="M 9,39 L 36,39 L 36,36 L 9,36 z"/><path d="M 12,36 L 12,32 L 33,32 L 33,36 z"/><path d="M 11,14 L 11,9 L 15,9 L 15,11 L 20,11 L 20,9 L 25,9 L 25,11 L 30,11 L 30,9 L 34,9 L 34,14 z"/><path d="M 12,14 L 33,14 L 31,32 L 14,32 z"/></g>`,
            'n': `<g><path d="M 22,10 C 32.5,11 38.5,18 38,39 L 15,39 C 15,30 25,32.5 23,18"/><path d="M 24,18 C 24.38,20.91 18.45,25.37 16,27 C 13,29 13.18,31.34 11,31 C 9.95,30.06 12.41,27.96 11,28 C 10,28 11.19,29.23 10,30 C 9,30 5.99,31 6,26 C 6,24 12,14 12,14 C 12,14 13.89,12.1 14,10.5 C 13.27,9.5 13.5,8.5 13.5,8.5 C 14.5,8 16.5,8 16.5,8 C 17,9.5 16,10 16.5,11 C 17,12 18,11.5 18,10.5 C 18,9.5 21,8.5 22,10 z"/></g>`,
            'b': `<g><path d="M 9,36 C 12.39,35.03 19.11,36.43 22.5,34 C 25.89,36.43 32.61,35.03 36,36 C 36,36 37.65,36.54 39,38 C 38.32,38.97 37.35,38.99 36,38.5 C 32.61,37.53 25.89,38.93 22.5,36.5 C 19.11,38.93 12.39,37.53 9,38.5 C 7.65,38.99 6.68,38.97 6,38 C 7.35,36.54 9,36 9,36 z"/><path d="M 15,32 C 17.5,34.5 27.5,34.5 30,32 C 30.5,30.5 30,22 30,22 C 30,22 25.5,14 22.5,10.5 C 19.5,14 15,22 15,22 C 15,22 14.5,30.5 15,32 z"/><circle cx="22.5" cy="8.5" r="1.5"/><path d="M 17.5,26 L 27.5,26"/><path d="M 22.5,21 L 22.5,31"/></g>`,
            'q': `<g><path d="M 9,26 C 17.5,24.5 30,24.5 36,26 L 38,14 L 31,25 L 22.5,11 L 14,25 L 7,14 z"/><path d="M 9,26 C 9,28 10.5,28 11.5,30 C 12.5,32 12.5,34.5 12,36 L 33,36 C 32.5,34.5 32.5,32 33.5,30 C 34.5,28 36,28 36,26"/><circle cx="6" cy="12" r="2"/><circle cx="14" cy="9" r="2"/><circle cx="22.5" cy="6" r="2"/><circle cx="31" cy="9" r="2"/><circle cx="39" cy="12" r="2"/><path d="M 11,39 L 34,39 L 34,36 L 11,36 z"/></g>`,
            'k': `<g><path d="M 22.5,11.5 L 22.5,6"/><path d="M 20,8 L 25,8"/><path d="M 11.5,37 C 17,35.5 28,35.5 33.5,37 L 33.5,35 C 28,33.5 17,33.5 11.5,35 z"/><path d="M 11.5,30 C 17,28.5 28,28.5 33.5,30 L 33.5,28 C 28,26.5 17,26.5 11.5,28 z"/><path d="M 11.5,30 L 11.5,35"/><path d="M 33.5,30 L 33.5,35"/><path d="M 20,11 C 15,11 10.5,14 10.5,20 C 10.5,25 14,28 15.5,28 C 17,28 28,28 29.5,28 C 31,28 34.5,25 34.5,20 C 34.5,14 30,11 25,11 z"/></g>`
        };

        function getPieceSVG(color, type) {
            const key = type.toLowerCase();
            const path = piecePaths[key];
            if (!path) return '';

            const isWhite = color === 'w';
            const fill = isWhite ? '#ffffff' : '#1c1c1e';
            const stroke = isWhite ? '#1c1c1e' : '#ffffff';

            return `<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">
                <g fill="${fill}" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    ${path}
                </g>
            </svg>`;
        }

        function selectMode(mode) {
            gameMode = mode;
            document.getElementById('mode-ai').classList.toggle('active', mode === 'ai');
            document.getElementById('mode-pvp').classList.toggle('active', mode === 'pvp');

            const colorCard = document.getElementById('card-color');
            const levelCard = document.getElementById('card-level');

            if (mode === 'pvp') {
                colorCard.classList.add('disabled-card');
                levelCard.classList.add('disabled-card');
            } else {
                colorCard.classList.remove('disabled-card');
                levelCard.classList.remove('disabled-card');
            }
        }

        function selectTime(seconds) {
            selectedTimeLimit = seconds;
            document.querySelectorAll('.time-grid .btn-option').forEach(b => b.classList.remove('active'));
            document.getElementById(`time-${seconds}`).classList.add('active');
        }

        function selectColorChoice(color) {
            selectedColorChoice = color;
            document.querySelectorAll('#card-color .btn-option').forEach(b => b.classList.remove('active'));
            document.getElementById(`color-btn-${color}`).classList.add('active');
        }

        function selectLevel(lvl) {
            selectedDepth = lvl;
            document.querySelectorAll('#card-level .btn-option').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('level-title').innerText = `Уровень ${levelNames[lvl]}`;
        }

        function showMenu() {
            stopTimer();
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
        }

        function startGame() {
            if (gameMode === 'ai') {
                playerColor = selectedColorChoice === 'random' ? (Math.random() > 0.5 ? 'w' : 'b') : selectedColorChoice;
                const colorLabel = playerColor === 'w' ? '⚪️ Белые' : '🖤 Черные';
                document.getElementById('game-info-badge').innerText = `ИИ (Ур. ${selectedDepth}) | ${colorLabel}`;
                document.getElementById('bottom-player-name').innerText = playerColor === 'w' ? '⚪️ Ты' : '🖤 Ты';
                document.getElementById('top-player-name').innerText = playerColor === 'w' ? '🖤 ИИ Stockfish' : '⚪️ ИИ Stockfish';
            } else {
                playerColor = 'w';
                document.getElementById('game-info-badge').innerText = `👥 2 Игрока (Локально)`;
                document.getElementById('bottom-player-name').innerText = '⚪️ Игрок 1 (Белые)';
                document.getElementById('top-player-name').innerText = '🖤 Игрок 2 (Черные)';
            }

            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');

            restartGame();
        }

        /* Форматирование времени (поддерживает часы) */
        function formatTime(sec) {
            if (sec <= 0) return '00:00';
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;

            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateTimerUI() {
            if (selectedTimeLimit === 0) {
                document.getElementById('top-timer').innerText = '∞';
                document.getElementById('bottom-timer').innerText = '∞';
                return;
            }

            const topSec = playerColor === 'w' ? blackTime : whiteTime;
            const bottomSec = playerColor === 'w' ? whiteTime : blackTime;

            document.getElementById('top-timer').innerText = formatTime(topSec);
            document.getElementById('bottom-timer').innerText = formatTime(bottomSec);

            const currentTurn = game.turn();
            const isBottomTurn = currentTurn === playerColor;

            document.getElementById('bottom-player-bar').classList.toggle('active-turn', isBottomTurn);
            document.getElementById('top-player-bar').classList.toggle('active-turn', !isBottomTurn);
        }

        function startTimer() {
            stopTimer();
            if (selectedTimeLimit === 0) {
                updateTimerUI();
                return;
            }

            timerInterval = setInterval(() => {
                if (game.game_over()) {
                    stopTimer();
                    return;
                }

                if (game.turn() === 'w') {
                    whiteTime--;
                    if (whiteTime <= 0) {
                        whiteTime = 0;
                        stopTimer();
                        setStatus('ВРЕМЯ ВЫШЛО! ЧЕРНЫЕ ПОБЕДИЛИ ⌛️');
                    }
                } else {
                    blackTime--;
                    if (blackTime <= 0) {
                        blackTime = 0;
                        stopTimer();
                        setStatus('ВРЕМЯ ВЫШЛО! БЕЛЫЕ ПОБЕДИЛИ ⌛️');
                    }
                }
                updateTimerUI();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function renderBoard() {
            const boardEl = document.getElementById('chessboard');
            boardEl.innerHTML = '';
            const board = game.board();

            const rows = playerColor === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
            const cols = playerColor === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];

            for (let r of rows) {
                for (let c of cols) {
                    const squareEl = document.createElement('div');
                    const squareName = String.fromCharCode(97 + c) + (8 - r);
                    const isLight = (r + c) % 2 === 0;

                    squareEl.className = `square ${isLight ? 'light' : 'dark'}`;
                    const piece = board[r][c];
                    if (piece) {
                        squareEl.innerHTML = getPieceSVG(piece.color, piece.type);
                    }

                    if (selectedSquare === squareName) squareEl.classList.add('selected');

                    if (selectedSquare) {
                        const moves = game.moves({ square: selectedSquare, verbose: true });
                        if (moves.some(m => m.to === squareName)) squareEl.classList.add('possible');
                    }

                    squareEl.onclick = () => handleSquareClick(squareName);
                    boardEl.appendChild(squareEl);
                }
            }
            updateStatus();
            updateTimerUI();
        }

        function handleSquareClick(square) {
            if (game.game_over()) return;

            if (gameMode === 'ai' && game.turn() !== playerColor) return;

            const currentTurn = game.turn();

            if (selectedSquare === null) {
                const piece = game.get(square);
                if (piece && piece.color === currentTurn) {
                    selectedSquare = square;
                }
            } else {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    selectedSquare = null;
                    renderBoard();

                    if (!game.game_over()) {
                        if (gameMode === 'ai') {
                            triggerAIMove();
                        }
                    }
                } else {
                    const piece = game.get(square);
                    selectedSquare = (piece && piece.color === currentTurn) ? square : null;
                }
            }
            renderBoard();
        }

        async function triggerAIMove() {
            setStatus(`ИИ ДУМАЕТ...`);
            try {
                const fen = encodeURIComponent(game.fen());
                const response = await fetch(`https://stockfish.online/api/s/v2.php?fen=${fen}&depth=${selectedDepth}`);
                const data = await response.json();

                if (data && data.success && data.bestmove) {
                    const moveStr = data.bestmove.split(' ')[1];
                    game.move({
                        from: moveStr.substring(0, 2),
                        to: moveStr.substring(2, 4),
                        promotion: moveStr.length > 4 ? moveStr[4] : 'q'
                    });
                }
            } catch (e) {
                const moves = game.moves();
                if (moves.length > 0) game.move(moves[Math.floor(Math.random() * moves.length)]);
            }
            renderBoard();
        }

        function setStatus(text) { document.getElementById('status').innerText = text; }

        function updateStatus() {
            if (game.in_checkmate()) {
                stopTimer();
                const winner = game.turn() === 'w' ? 'ЧЕРНЫЕ' : 'БЕЛЫЕ';
                setStatus(`МАТ! ПОБЕДИЛИ ${winner} 🎉`);
            } else if (game.in_draw()) {
                stopTimer();
                setStatus('НИЧЬЯ!');
            } else if (game.in_check()) {
                setStatus(`ШАХ! ХОД ${game.turn() === 'w' ? 'БЕЛЫХ' : 'ЧЕРНЫХ'}`);
            } else {
                if (gameMode === 'ai') {
                    setStatus(game.turn() === playerColor ? 'ТВОЙ ХОД' : 'ХОД ИИ...');
                } else {
                    setStatus(game.turn() === 'w' ? 'ХОД БЕЛЫХ' : 'ХОД ЧЕРНЫХ');
                }
            }
        }

        function restartGame() {
            game.reset();
            selectedSquare = null;
            whiteTime = selectedTimeLimit;
            blackTime = selectedTimeLimit;

            renderBoard();
            startTimer();

            if (gameMode === 'ai' && playerColor === 'b') {
                triggerAIMove();
            }
        }
    </script>
</body>
</html>
