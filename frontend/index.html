<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a20;
            --border-color: #2a2a35;
            --grid-bg: #141419;
            --cell-empty: #1f1f28;
            --text-primary: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #007aff;
            --radius-main: 20px;
            --radius-cell: 6px;
            --font-main: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Запрещаем скролл страницы при перетаскивании */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        header {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .score-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 14px;
            text-align: center;
            flex: 1;
            margin: 0 4px;
        }

        .score-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
        }

        .combo-badge {
            position: absolute;
            top: 70px;
            font-size: 14px;
            font-weight: 800;
            color: #ffcc00;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .combo-badge.show {
            opacity: 1;
            transform: scale(1.2);
        }

        /* Доска 8x8 */
        .board-container {
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-main);
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 6px;
            position: relative;
        }

        .cell {
            background-color: var(--cell-empty);
            border-radius: var(--radius-cell);
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

        .cell.highlight-valid {
            background-color: rgba(255, 255, 255, 0.25) !important;
            transform: scale(0.95);
        }

        .cell.clear-anim {
            animation: popClear 0.25s forwards ease-out;
        }

        @keyframes popClear {
            0% { transform: scale(1); filter: brightness(2); }
            50% { transform: scale(1.2); }
            100% { transform: scale(0); }
        }

        /* Трей фигурок */
        .tray {
            width: 100%;
            max-width: 360px;
            height: 120px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 10px;
        }

        .piece-slot {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .piece-grid {
            display: grid;
            gap: 3px;
            cursor: grab;
            transition: transform 0.1s ease;
        }

        .piece-block {
            width: 22px;
            height: 22px;
            border-radius: 4px;
        }

        /* Перетаскиваемый клон */
        #drag-clone {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            display: none;
            transform: translate(-50%, -50%) scale(1.1);
        }

        #drag-clone .piece-block {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        /* Модалка Окончания Игры */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .modal.active {
            display: flex;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .btn-restart {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="score-card">
            <div class="score-label">СЧЕТ</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-card">
            <div class="score-label">РЕКОРД</div>
            <div class="score-value" id="high-score">0</div>
        </div>
    </header>

    <div class="combo-badge" id="combo-badge">COMBO x2! 🔥</div>

    <div class="board-container" id="board"></div>

    <div class="tray" id="tray">
        <div class="piece-slot" data-slot="0"></div>
        <div class="piece-slot" data-slot="1"></div>
        <div class="piece-slot" data-slot="2"></div>
    </div>

    <!-- Клон для перетаскивания -->
    <div id="drag-clone"></div>

    <!-- Экран Game Over -->
    <div class="modal" id="game-over-modal">
        <div class="modal-title">НЕТ МЕСТА! 💥</div>
        <div style="font-size: 16px; color: var(--text-muted);" id="final-score">Счет: 0</div>
        <button class="btn-restart" onclick="resetGame()">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        // Инициализация звуков (Web Audio API)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSound(type, combo = 1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'place') {
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.08);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'clear') {
                // Нота звучит выше с каждым комбо
                const baseFreq = 261.63; // C4
                const freq = baseFreq * Math.pow(1.2, combo);
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.2);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.4);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        function triggerHaptic(type) {
            if (tg?.HapticFeedback) {
                if (type === 'light') tg.HapticFeedback.impactOccurred('light');
                if (type === 'medium') tg.HapticFeedback.impactOccurred('medium');
                if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
            }
        }

        /* Логика Игры */
        const BOARD_SIZE = 8;
        let grid = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
        let score = 0;
        let highScore = localStorage.getItem('bb_highscore') || 0;
        let comboCount = 0;

        const COLORS = [
            '#FF3B30', '#FF9500', '#FFCC00', '#34C759',
            '#007AFF', '#5856D6', '#AF52DE', '#FF2D55'
        ];

        // Базовые фигуры
        const SHAPES = [
            [[1]], // 1x1
            [[1, 1]], // 2x1
            [[1], [1]],
            [[1, 1, 1]], // 3x1
            [[1], [1], [1]],
            [[1, 1], [1, 1]], // Square 2x2
            [[1, 1, 1], [1, 1, 1], [1, 1, 1]], // Square 3x3
            [[1, 0], [1, 0], [1, 1]], // L-shape
            [[0, 1], [0, 1], [1, 1]],
            [[1, 1, 1], [0, 1, 0]], // T-shape
        ];

        let trayPieces = [null, null, null];
        let activeDrag = null;

        // Элементы DOM
        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const dragClone = document.getElementById('drag-clone');
        const comboBadge = document.getElementById('combo-badge');

        highScoreEl.innerText = highScore;

        // Создаем сетку доски
        function createBoardUI() {
            boardEl.innerHTML = '';
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    boardEl.appendChild(cell);
                }
            }
        }

        function renderBoard() {
            const cells = boardEl.children;
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const idx = r * BOARD_SIZE + c;
                    const cell = cells[idx];
                    const val = grid[r][c];
                    cell.classList.remove('highlight-valid');
                    if (val !== 0) {
                        cell.style.backgroundColor = val;
                    } else {
                        cell.style.backgroundColor = 'var(--cell-empty)';
                    }
                }
            }
        }

        // Спавн 3 случайных фигурок
        function spawnTrayPieces() {
            for (let i = 0; i < 3; i++) {
                if (!trayPieces[i]) {
                    const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    trayPieces[i] = { shape, color };
                }
            }
            renderTray();
            checkGameOver();
        }

        function renderTray() {
            const slots = document.querySelectorAll('.piece-slot');
            slots.forEach((slot, idx) => {
                slot.innerHTML = '';
                const p = trayPieces[idx];
                if (p) {
                    const pGrid = createPieceDOM(p.shape, p.color, 22);
                    pGrid.dataset.slot = idx;
                    pGrid.addEventListener('pointerdown', (e) => startDrag(e, idx));
                    slot.appendChild(pGrid);
                }
            });
        }

        function createPieceDOM(shape, color, blockSize) {
            const container = document.createElement('div');
            container.className = 'piece-grid';
            container.style.gridTemplateColumns = `repeat(${shape[0].length}, ${blockSize}px)`;

            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    const block = document.createElement('div');
                    block.className = 'piece-block';
                    if (shape[r][c] === 1) {
                        block.style.backgroundColor = color;
                    } else {
                        block.style.opacity = '0';
                    }
                    container.appendChild(block);
                }
            }
            return container;
        }

        /* Drag and Drop Логика */
        function startDrag(e, slotIdx) {
            initAudio();
            const piece = trayPieces[slotIdx];
            if (!piece) return;

            triggerHaptic('light');

            activeDrag = {
                slotIdx,
                piece,
                element: e.currentTarget
            };

            // Создаем клон для перетаскивания
            dragClone.innerHTML = '';
            const clonePiece = createPieceDOM(piece.shape, piece.color, 34);
            dragClone.appendChild(clonePiece);
            dragClone.style.display = 'block';

            activeDrag.element.style.opacity = '0.2';

            updateDragPosition(e);

            document.addEventListener('pointermove', onDragMove);
            document.addEventListener('pointerup', onDragEnd);
        }

        function updateDragPosition(e) {
            // Смещаем фигуру чуть выше пальца (-60px), чтобы игрок видел куда ставит
            const x = e.clientX;
            const y = e.clientY - 60;
            dragClone.style.left = `${x}px`;
            dragClone.style.top = `${y}px`;

            // Подсветка клеток на доске
            clearHighlights();
            const targetCell = getTargetBoardCell(x, y);
            if (targetCell) {
                const { r, c } = targetCell;
                if (canPlace(activeDrag.piece.shape, r, c)) {
                    highlightCells(activeDrag.piece.shape, r, c);
                }
            }
        }

        function onDragMove(e) {
            if (!activeDrag) return;
            updateDragPosition(e);
        }

        function onDragEnd(e) {
            if (!activeDrag) return;

            const x = e.clientX;
            const y = e.clientY - 60;
            const targetCell = getTargetBoardCell(x, y);

            let placed = false;

            if (targetCell) {
                const { r, c } = targetCell;
                if (canPlace(activeDrag.piece.shape, r, c)) {
                    placePiece(activeDrag.piece, r, c);
                    trayPieces[activeDrag.slotIdx] = null;
                    placed = true;
                }
            }

            dragClone.style.display = 'none';
            clearHighlights();

            if (!placed) {
                activeDrag.element.style.opacity = '1';
            } else {
                playSound('place');
                triggerHaptic('medium');
                // Проверяем сгоревшие линии
                checkLines();
                // Если все 3 фигуры потрачены — спавним новые
                if (trayPieces.every(p => p === null)) {
                    spawnTrayPieces();
                } else {
                    renderTray();
                    checkGameOver();
                }
            }

            activeDrag = null;
            document.removeEventListener('pointermove', onDragMove);
            document.removeEventListener('pointerup', onDragEnd);
        }

        function getTargetBoardCell(x, y) {
            const boardRect = boardEl.getBoundingClientRect();
            if (x < boardRect.left || x > boardRect.right || y < boardRect.top || y > boardRect.bottom) {
                return null;
            }
            const cellSize = boardRect.width / BOARD_SIZE;
            const c = Math.floor((x - boardRect.left) / cellSize);
            const r = Math.floor((y - boardRect.top) / cellSize);
            return { r, c };
        }

        function canPlace(shape, startR, startC) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c] === 1) {
                        const targetR = startR + r;
                        const targetC = startC + c;
                        if (targetR >= BOARD_SIZE || targetC >= BOARD_SIZE || grid[targetR][targetC] !== 0) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function placePiece(piece, startR, startC) {
            let blocksPlaced = 0;
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c] === 1) {
                        grid[startR + r][startC + c] = piece.color;
                        blocksPlaced++;
                    }
                }
            }
            addScore(blocksPlaced * 10);
            renderBoard();
        }

        function highlightCells(shape, startR, startC) {
            const cells = boardEl.children;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c] === 1) {
                        const idx = (startR + r) * BOARD_SIZE + (startC + c);
                        if (cells[idx]) cells[idx].classList.add('highlight-valid');
                    }
                }
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight-valid'));
        }

        /* Проверка Сгорания Линий */
        function checkLines() {
            let rowsToClear = [];
            let colsToClear = [];

            // Проверка строк
            for (let r = 0; r < BOARD_SIZE; r++) {
                if (grid[r].every(val => val !== 0)) rowsToClear.push(r);
            }

            // Проверка столбцов
            for (let c = 0; c < BOARD_SIZE; c++) {
                let full = true;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    if (grid[r][c] === 0) { full = false; break; }
                }
                if (full) colsToClear.push(c);
            }

            const totalLines = rowsToClear.length + colsToClear.length;

            if (totalLines > 0) {
                comboCount++;
                showComboBadge(comboCount);
                playSound('clear', comboCount);
                triggerHaptic('success');

                // Очищаем ячейки в массиве
                rowsToClear.forEach(r => {
                    for (let c = 0; c < BOARD_SIZE; c++) grid[r][c] = 0;
                });
                colsToClear.forEach(c => {
                    for (let r = 0; r < BOARD_SIZE; r++) grid[r][c] = 0;
                });

                // Начисляем очки за линии и комбо
                addScore(totalLines * 100 * comboCount);

                setTimeout(() => {
                    renderBoard();
                }, 100);
            } else {
                comboCount = 0; // Сброс комбо если ходов без сгораний не было
            }
        }

        function showComboBadge(count) {
            if (count < 2) return;
            comboBadge.innerText = `COMBO x${count}! 🔥`;
            comboBadge.classList.add('show');
            setTimeout(() => comboBadge.classList.remove('show'), 1000);
        }

        function addScore(pts) {
            score += pts;
            scoreEl.innerText = score;
            if (score > highScore) {
                highScore = score;
                highScoreEl.innerText = highScore;
                localStorage.setItem('bb_highscore', highScore);
            }
        }

        /* Проверка Game Over */
        function checkGameOver() {
            let hasAnyMove = false;

            for (let p = 0; p < trayPieces.length; p++) {
                const piece = trayPieces[p];
                if (!piece) continue;

                // Перебираем все возможные клетки на доске для фигуры
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (canPlace(piece.shape, r, c)) {
                            hasAnyMove = true;
                            break;
                        }
                    }
                    if (hasAnyMove) break;
                }
                if (hasAnyMove) break;
            }

            if (!hasAnyMove && trayPieces.some(p => p !== null)) {
                playSound('gameover');
                document.getElementById('final-score').innerText = `Счет: ${score}`;
                document.getElementById('game-over-modal').classList.add('active');
            }
        }

        function resetGame() {
            grid = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
            score = 0;
            comboCount = 0;
            scoreEl.innerText = '0';
            trayPieces = [null, null, null];
            document.getElementById('game-over-modal').classList.remove('active');
            renderBoard();
            spawnTrayPieces();
        }

        // Запуск
        createBoardUI();
        renderBoard();
        spawnTrayPieces();
    </script>
</body>
</html>
